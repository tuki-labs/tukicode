name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: tuki.exe
            asset_name: tuki-windows.exe
          - os: macos-latest
            artifact_name: tuki
            asset_name: tuki-macos
          - os: ubuntu-latest
            artifact_name: tuki
            asset_name: tuki-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name tuki --hidden-import winpty tuki.py

      - name: Build binary (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name tuki tuki.py
          chmod +x dist/tuki

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tuki-windows.exe/tuki.exe
            dist/tuki-macos/tuki
            dist/tuki-linux/tuki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
