name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow the workflow to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: tuki-windows.exe
            asset_name: tuki-windows.exe
          - os: macos-latest
            artifact_name: tuki-macos
            asset_name: tuki-macos
          - os: ubuntu-latest
            artifact_name: tuki-linux
            asset_name: tuki-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller tuki.spec
          if [ "$RUNNER_OS" = "macOS" ]; then
            mv dist/tuki dist/tuki-macos
          elif [ "$RUNNER_OS" = "Linux" ]; then
            mv dist/tuki dist/tuki-linux
          fi
        shell: bash

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        run: |
          mv dist/tuki.exe dist/tuki-windows.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tuki-windows.exe/tuki-windows.exe
            dist/tuki-macos/tuki-macos
            dist/tuki-linux/tuki-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
